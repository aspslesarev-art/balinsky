name: Sync fast content (events / news / promo / knowledge / managers)

# Cheap syncs that finish in a couple of minutes — events, news, promo,
# knowledge articles, manager directory. Runs every 15 min so a freshly
# published event/news article hits the site within ~20 min worst case.
#
# The heavy rental sync (with photo caching, 800+ rows) lives in a
# separate workflow so it can't drag this one over the timeout and
# block the final cache revalidation.

on:
  schedule:
    # Same staggered slots as the old sync-content.yml — these are the
    # least-likely-to-be-skipped quarter-hour boundaries on free GH.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-fast
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Write .env.local from secrets
        run: |
          cat > .env.local <<EOF
          AIRTABLE_TOKEN=${{ secrets.AIRTABLE_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      - name: Sync events
        run: node scripts/sync-events.mjs

      - name: Sync news
        run: node scripts/sync-news.mjs

      - name: Sync promo
        run: node scripts/sync-promo.mjs

      - name: Sync knowledge
        run: node scripts/sync-knowledge.mjs

      - name: Sync managers
        run: node scripts/sync-managers.mjs

      - name: Sync videos
        run: node scripts/sync-videos.mjs

      - name: Sync developers
        run: node scripts/sync-developers.mjs

      - name: Sync villas (data only)
        run: node scripts/sync-villas-data.mjs

      - name: Sync apartments (data only)
        run: node scripts/sync-apartments-data.mjs

      - name: Sync complexes (data only)
        run: node scripts/sync-complexes-data.mjs

      - name: Merge complex EN translations
        run: node scripts/sync-complexes-en.mjs

      - name: Rebuild villa / apartment / complex slug indexes
        # The detail-page slug index is used by /ru/zhilye-kompleksy/o/<slug>
        # to resolve slug → airtable_id (avoiding a 9MB+ full-table read).
        # Without this step a newly-published complex 404s until the index
        # is regenerated. Cheap (a few hundred slugs → ~15 KB JSON).
        run: node scripts/sync-detail-indexes.mjs

      - name: Revalidate site caches (fast kinds)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_TOKEN: ${{ secrets.REVALIDATE_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${SITE_URL}/api/revalidate-content?kinds=events,news,promo,knowledge,managers,videos,developers,villas,apartments,complexes" \
            -H "Authorization: Bearer ${REVALIDATE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | tee /dev/stderr
