name: Sync heavy content (rental + villa/apartment photos)

# Photo-heavy syncs that take minutes per run. Rental sync caches
# every photo from Airtable into Storage (3000+ HTTP downloads on a
# full run). Villa + apartment photo syncs use att-id change detection
# in resume mode, so a normal hourly run only re-pulls records whose
# Airtable photos actually changed — usually zero. The first run after
# this file lands re-syncs everyone (no att-id manifest yet); after
# that it's near-zero-cost.

on:
  schedule:
    # Once per hour at :15, after the fast workflow's :07 slot has
    # already cleared.
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      force_slugs:
        description: 'Comma-separated SEO:Slug substrings to force-resync (e.g. "maison-boheme"). Leave empty for normal cron behavior.'
        required: false
        default: ''

concurrency:
  group: sync-heavy
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Write .env.local from secrets
        run: |
          cat > .env.local <<EOF
          AIRTABLE_TOKEN=${{ secrets.AIRTABLE_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      - name: Sync rental
        run: node scripts/sync-rental.mjs

      - name: Sync villa photos
        env:
          FORCE_SLUGS: ${{ github.event.inputs.force_slugs }}
        run: |
          ARGS=""
          if [ -n "${FORCE_SLUGS}" ]; then ARGS="--force-slugs=${FORCE_SLUGS}"; fi
          node scripts/sync-villa-photos.mjs $ARGS

      - name: Sync apartment photos
        env:
          FORCE_SLUGS: ${{ github.event.inputs.force_slugs }}
        run: |
          ARGS=""
          if [ -n "${FORCE_SLUGS}" ]; then ARGS="--force-slugs=${FORCE_SLUGS}"; fi
          node scripts/sync-apartments-photos.mjs $ARGS

      - name: Revalidate rental + villa + apartment caches
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_TOKEN: ${{ secrets.REVALIDATE_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${SITE_URL}/api/revalidate-content?kinds=rental,villas,apartments" \
            -H "Authorization: Bearer ${REVALIDATE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | tee /dev/stderr
