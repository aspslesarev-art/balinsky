name: Sync heavy content (rental + photos)

# Rental sync caches every photo from Airtable into Storage — that's
# 3000+ HTTP downloads on a full run, takes 20-40 min. Lives on its
# own schedule so it can't push the fast events/news pipeline over
# the timeout. Runs hourly; rentals don't change minute-to-minute.

on:
  schedule:
    # Once per hour at :15, after the fast workflow's :07 slot has
    # already cleared.
    - cron: '15 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-heavy
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Write .env.local from secrets
        run: |
          cat > .env.local <<EOF
          AIRTABLE_TOKEN=${{ secrets.AIRTABLE_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      - name: Sync rental
        run: node scripts/sync-rental.mjs

      - name: Revalidate rental cache
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_TOKEN: ${{ secrets.REVALIDATE_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${SITE_URL}/api/revalidate-content?kinds=rental" \
            -H "Authorization: Bearer ${REVALIDATE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | tee /dev/stderr
