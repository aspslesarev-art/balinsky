name: Sync heavy content (rental + villa/apartment/complex photos)

# Photo-heavy syncs that take minutes per run. Rental sync caches
# every photo from Airtable into Storage (3000+ HTTP downloads on a
# full run). Villa / apartment / complex photo syncs use att-id change
# detection in resume mode, so a normal hourly run only re-pulls
# records whose Airtable photos actually changed — usually zero. The
# first run after this file lands re-syncs everyone (no att-id
# manifest yet); after that it's near-zero-cost.

on:
  schedule:
    # Once per hour at :15, after the fast workflow's :07 slot has
    # already cleared.
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      force_slugs:
        description: 'Comma-separated SEO:Slug substrings to force-resync (e.g. "maison-boheme"). Leave empty for normal cron behavior.'
        required: false
        default: ''

concurrency:
  group: sync-heavy
  cancel-in-progress: false

jobs:
  sync:
    # Kill-switch: set repo variable SYNC_DISABLED=1 to neutralize the
    # Airtable→Supabase sync once the admin "Базы" panel is source of truth.
    # The cron still wakes but the job no-ops; unset the var to resume.
    if: ${{ vars.SYNC_DISABLED != '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --no-audit --no-fund

      # Retry transient network blips (ETIMEDOUT/ENETUNREACH/429/5xx) on the
      # sync steps below, so a single flaky Airtable/Supabase call doesn't fail
      # the whole run. Set here (not job-level env) so the --import preload file
      # already exists from checkout; applies to every later node step.
      - name: Enable transient-fetch retry
        run: echo "NODE_OPTIONS=--import=./scripts/_fetch-retry.mjs" >> "$GITHUB_ENV"

      - name: Write .env.local from secrets
        run: |
          cat > .env.local <<EOF
          AIRTABLE_TOKEN=${{ secrets.AIRTABLE_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_CHAT_DEPLOYMENT=${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
          PHOTO_CDN_BASE=${{ secrets.PHOTO_CDN_BASE }}
          EOF

      - name: Sync rental
        run: node scripts/sync-rental.mjs

      - name: Translate missing EN (rental)
        run: node scripts/translate-missing.mjs rental
        continue-on-error: true

      - name: Sync complex logos + covers
        run: node scripts/sync-complexes.mjs

      - name: Sync villa photos
        env:
          FORCE_SLUGS: ${{ github.event.inputs.force_slugs }}
        run: |
          ARGS=""
          if [ -n "${FORCE_SLUGS}" ]; then ARGS="--force-slugs=${FORCE_SLUGS}"; fi
          node scripts/sync-villa-photos.mjs $ARGS

      - name: Sync apartment photos
        env:
          FORCE_SLUGS: ${{ github.event.inputs.force_slugs }}
        run: |
          ARGS=""
          if [ -n "${FORCE_SLUGS}" ]; then ARGS="--force-slugs=${FORCE_SLUGS}"; fi
          node scripts/sync-apartments-photos.mjs $ARGS

      - name: Sync complex photos
        env:
          FORCE_SLUGS: ${{ github.event.inputs.force_slugs }}
        run: |
          ARGS=""
          if [ -n "${FORCE_SLUGS}" ]; then ARGS="--force-slugs=${FORCE_SLUGS}"; fi
          node scripts/sync-complex-photos.mjs $ARGS

      - name: Revalidate rental + villa + apartment + complex caches
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_TOKEN: ${{ secrets.REVALIDATE_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${SITE_URL}/api/revalidate-content?kinds=rental,villas,apartments,complexes" \
            -H "Authorization: Bearer ${REVALIDATE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | tee /dev/stderr
