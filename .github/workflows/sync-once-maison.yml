name: One-shot — sync data + photos now

# Throwaway workflow. Triggers when this file itself lands on main
# (paths filter), runs the data sync scripts (which now also prune
# rows missing from Airtable, so editor deletes propagate), then
# force-resyncs photos for Maison Boheme, then revalidates the
# listings. Delete this file after the run shows up green in the
# Actions tab.
#
# Why a separate workflow: the regular sync-fast/sync-heavy only
# trigger via cron or workflow_dispatch — neither reachable from
# the conversational MCP environment. on:push lets us fire work
# just by pushing to main.

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-once-maison.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Write .env.local from secrets
        run: |
          cat > .env.local <<EOF
          AIRTABLE_TOKEN=${{ secrets.AIRTABLE_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      # Data sync — pulls latest fields from Airtable and (new!)
      # prunes Supabase rows whose airtable_id is no longer in the
      # source. This is what removes the $135k Maison apartment that
      # was deleted in Airtable but stayed on the site.
      - name: Sync villa data + prune deletes
        run: node --import=./scripts/_fetch-retry.mjs scripts/sync-villas-data.mjs

      - name: Sync apartment data + prune deletes
        run: node --import=./scripts/_fetch-retry.mjs scripts/sync-apartments-data.mjs

      - name: Sync complex data + prune deletes
        run: node --import=./scripts/_fetch-retry.mjs scripts/sync-complexes-data.mjs

      - name: Force-resync villa photos for Maison Boheme
        run: node --import=./scripts/_fetch-retry.mjs scripts/sync-villa-photos.mjs --force-slugs=maison-boheme

      - name: Force-resync apartment photos for Maison Boheme
        run: node --import=./scripts/_fetch-retry.mjs scripts/sync-apartments-photos.mjs --force-slugs=maison-boheme

      - name: Revalidate villa + apartment + complex caches
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_TOKEN: ${{ secrets.REVALIDATE_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${SITE_URL}/api/revalidate-content?kinds=villas,apartments,complexes" \
            -H "Authorization: Bearer ${REVALIDATE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | tee /dev/stderr
