name: One-shot — force-resync Maison Boheme photos

# Throwaway workflow. Triggers when this file itself lands on main
# (paths filter), forces a photo re-pull for everything matching
# slug "maison-boheme", revalidates the listings, and exits. Delete
# this file after the run shows up green in the Actions tab.
#
# Why a separate workflow: the regular sync-heavy.yml only triggers
# via cron or workflow_dispatch — neither of which we can fire from
# the conversational MCP environment. on:push lets us trigger the
# work just by pushing to main.

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-once-maison.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Write .env.local from secrets
        run: |
          cat > .env.local <<EOF
          AIRTABLE_TOKEN=${{ secrets.AIRTABLE_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          EOF

      - name: Force-resync villa photos for Maison Boheme
        run: node scripts/sync-villa-photos.mjs --force-slugs=maison-boheme

      - name: Force-resync apartment photos for Maison Boheme
        run: node scripts/sync-apartments-photos.mjs --force-slugs=maison-boheme

      - name: Revalidate villa + apartment caches
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_TOKEN: ${{ secrets.REVALIDATE_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST "${SITE_URL}/api/revalidate-content?kinds=villas,apartments" \
            -H "Authorization: Bearer ${REVALIDATE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            | tee /dev/stderr
